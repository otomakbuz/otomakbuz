<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Receipt/document icon -->
  <rect x="4" y="4" width="28" height="34" rx="2.5" fill="#4A3728"/>
  <!-- Torn bottom edge -->
  <path d="M4 34 L7.5 38 L11 34 L14.5 38 L18 34 L21.5 38 L25 34 L28.5 38 L32 34 L32 38 C32 39.657 30.657 41 29 41 L7 41 C5.343 41 4 39.657 4 38 Z" fill="#4A3728"/>
  <!-- Paper inner area -->
  <rect x="7.5" y="7.5" width="21" height="24" rx="1.5" fill="#FFFDF8"/>
  <!-- Text lines -->
  <rect x="10" y="11" width="15" height="1.8" rx="0.9" fill="#D4C5B0"/>
  <rect x="10" y="15.5" width="11" height="1.8" rx="0.9" fill="#D4C5B0"/>
  <rect x="10" y="20" width="13" height="1.8" rx="0.9" fill="#D4C5B0"/>
  <!-- Divider -->
  <line x1="10" y1="24.5" x2="25.5" y2="24.5" stroke="#D4C5B0" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <!-- Total line -->
  <rect x="10" y="27" width="8" height="2" rx="1" fill="#A0845C"/>
  <rect x="20" y="27" width="5.5" height="2" rx="1" fill="#4A3728"/>
  <!-- Checkmark badge -->
  <circle cx="30" cy="10" r="7" fill="#A0845C"/>
  <path d="M26.5 10 L29 12.5 L34 7.5" stroke="#FFFDF8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "Oto" text -->
  <text x="46" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#A0845C" letter-spacing="-0.5">Oto</text>
  <!-- "makbuz" text -->
  <text x="90" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#4A3728" letter-spacing="-0.5">makbuz</text>
</svg>
